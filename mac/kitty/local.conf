# macOS-ONLY overrides — tied to this MacBook Air's small 1440x900 screen.
# Loaded last via kitty.conf's `include local.conf`, so these win over the base config.
# The base kitty.conf (Regular, 12pt) is the Arch config and is left untouched there.
#
# Mac tweak: use the Bold face as the base font and bump the size up for the small display.
font_family      Hack Nerd Font Mono Bold
italic_font      Hack Nerd Font Mono Bold Italic
bold_italic_font Hack Nerd Font Mono Bold Italic
font_size        14.0

# Lighter Tokyo Night "Storm" background + brighter foreground (matches the old
# iTerm2 setup), for better readability through the transparent background on this Mac.
background  #24283b
foreground  #c0caf5

# Reshape the character cell toward iTerm2's feel: narrower columns, taller lines.
# Eyeball starting values — tune the percentages to taste (width down = narrower,
# height up = more line spacing).
modify_font cell_width  97%
modify_font cell_height 104%

# Small gap between text and window edge, matching iTerm2's default margins
# (2pt vertical, 5pt horizontal). Two values = vertical, horizontal.
window_padding_width 2 5
